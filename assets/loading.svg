<svg width="600" height="170" viewBox="0 0 600 170"
     xmlns="http://www.w3.org/2000/svg">

  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 34px;
      font-weight: 700;
      fill: #2563eb;
    }

    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 17px;
      fill: #64748b;
    }

    .dot {
      fill: #2563eb;
      animation: pulse 1.4s infinite ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 80%, 100% {
        opacity: 0.25;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>

  <text x="300" y="55" text-anchor="middle" class="title">
    SmartInvest Platform
  </text>

  <text x="300" y="88" text-anchor="middle" class="subtitle">
    Development in progress — coming soon
  </text>

  <g transform="translate(270, 120)">
    <circle class="dot" cx="0" cy="0" r="8"/>
    <circle class="dot" cx="30" cy="0" r="8"/>
    <circle class="dot" cx="60" cy="0" r="8"/>
  </g>

</svg>