<div class="login">
  <!-- الجانب اليمين: العلامة (RTL) -->
  <div class="brandside">
    <a class="back" routerLink="/">
      <svg viewBox="0 0 24 24" width="18" fill="none" stroke="currentColor" stroke-width="1.9">
        <path d="M9 6l6 6-6 6" />
      </svg>
      الرئيسية
    </a>
    <div class="mark">
      @if (!imgFailed) {
        <img src="menoufia-emblem.png" alt="شعار محافظة المنوفية" (error)="imgFailed = true" />
      } @else {
        <span class="mark-fallback">◈</span>
      }
    </div>
    <div class="rep">الجمهورية العربية المصرية</div>
    <h2>محافظة المنوفية</h2>
    <div class="divider"></div>
    <p class="sys">نظام إدارة الاستثمار والمشروعات</p>
    <div class="glass">
      <b>SmartInvest</b>
      <span>المرحلة الأولى — إدارة التخطيط</span>
    </div>
  </div>

  <!-- الجانب الشمال: الفورم -->
  <div class="formside">
    <div class="lcard">
      <h2>تسجيل الدخول</h2>
      <p class="sub">أدخل بيانات حسابك للوصول إلى النظام</p>

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <form (ngSubmit)="submit()">
        <div class="lfield">
          <label>البريد الإلكتروني أو اسم المستخدم</label>
          <div class="box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" />
            </svg>
            <input
              type="text"
              autocomplete="username"
              placeholder="example@menoufia.gov.eg"
              [ngModel]="usernameOrEmail()"
              (ngModelChange)="usernameOrEmail.set($event)"
              name="usernameOrEmail"
            />
          </div>
        </div>

        <div class="lfield">
          <label>كلمة المرور</label>
          <div class="box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="10" width="16" height="10" rx="2" /><path d="M8 10V7a4 4 0 0 1 8 0v3" />
            </svg>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="••••••••"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
            />
            <button type="button" class="eye" (click)="showPassword.set(!showPassword())" aria-label="إظهار كلمة المرور">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="lbtn" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span> جاري الدخول…
          } @else {
            <svg viewBox="0 0 24 24" width="17" fill="none" stroke="currentColor" stroke-width="1.9">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
            </svg>
            تسجيل الدخول
          }
        </button>
      </form>

      <p class="foot">© 2026 محافظة المنوفية — نظام SmartInvest</p>
    </div>
  </div>
</div>
