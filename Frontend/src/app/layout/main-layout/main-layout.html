<div class="shell">
  <!-- الشريط الجانبي على اليمين (الأول في الـ DOM = يمين في RTL) -->
  <aside class="side">
    <div class="logo">
      <div class="mark">◈</div>
      <div class="logo-txt">
        <b>SmartInvest</b>
        <span>محافظة المنوفية</span>
      </div>
    </div>

    <div class="sec">القائمة الرئيسية</div>
    <nav class="nav-list">
      @for (item of nav(); track item.route) {
        <a class="nav" [routerLink]="item.route" routerLinkActive="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path [attr.d]="item.icon" />
          </svg>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="sec">المرحلة الحالية</div>
    <div class="phase">المرحلة الأولى — إدارة التخطيط</div>

    <div class="grow"></div>

    <div class="me">
      <div class="av">{{ initial() }}</div>
      <div class="me-txt">
        <b>{{ user()?.fullName }}</b>
        <span>{{ roleLabel() }}</span>
      </div>
    </div>
    <button class="logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
      </svg>
      تسجيل الخروج
    </button>
  </aside>

  <!-- المحتوى -->
  <div class="content">
    <header class="topbar">
      <div class="tb-user">
        <div class="tb-av">{{ initial() }}</div>
        <div class="tb-txt">
          <b>{{ user()?.fullName }}</b>
          <span>{{ roleLabel() }}</span>
        </div>
      </div>
      <button class="tb-bell" aria-label="التنبيهات">
        <span class="dot"></span>
        <svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" /></svg>
      </button>
      <div class="tb-grow"></div>
      <div class="tb-date">{{ today }}</div>
    </header>
    <router-outlet />
  </div>
</div>
